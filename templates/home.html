<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            background: white;
            width: 420px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 15px;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 220px;
            resize: none;
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 10px;
            font-size: 14px;
            background: #f9f9f9;
            outline: none;
        }

        input {
            width: 75%;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            background: #667eea;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
    </style>

</head>

<body>

    <div class="chat-container">

        <h1>🤖 AI Chatbot</h1>

        <form method="POST">
            <textarea name="chat" readonly>
{{ chat if chat else "" }}
            </textarea>

            <br>

            <input type="text" name="qts" placeholder="Type your question..." required>
            <button type="submit">Send</button>
        </form>

        <div class="footer">
            Powered by Flask + NLP
        </div>

    </div>

</body>
</html>
